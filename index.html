<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RH Management — Growth Partner for Brands & Marketplaces</title>
  <meta name="description" content="RH Management membantu brand bertumbuh di e-commerce & sosial media: ops, ads, content, KOL, data." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%2310b981'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-neutral-950 text-neutral-100">

  <!-- Hero -->
  <main>
    <section class="relative overflow-hidden">
      <div class="relative max-w-6xl mx-auto px-4 pt-16 pb-24">
        <div class="grid md:grid-cols-2 gap-10 items-center">
          
          <div>
            <!-- 🔥 DINAMIS DARI SUPABASE -->
            <h1 id="hero-title" class="text-5xl md:text-7xl font-extrabold leading-tight">
              Loading...
            </h1>

            <p id="hero-desc" class="mt-5 text-neutral-300 max-w-xl text-lg md:text-xl">
              Loading description...
            </p>

            <div class="mt-7 flex flex-wrap gap-3">
              <a href="contact.html" class="px-5 py-3 rounded-2xl bg-emerald-500 text-neutral-900 font-semibold">
                Konsultasi Gratis
              </a>
            </div>

            <!-- 🔥 Highlight Dinamis -->
            <div id="hero-highlight" class="mt-8 flex items-center gap-6 text-sm text-neutral-400">
            </div>

          </div>

        </div>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('y')?.textContent = new Date().getFullYear();
  </script>

  <!-- 🔥 SUPABASE SCRIPT -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://buewhelfrkkjbpsvhcjj.supabase.co";
    const supabaseKey = "sb_publishable_rkrQXr7k16ITYg2POkImXA_jqOx11F0";

    const { createClient } = supabase;
    const db = createClient(supabaseUrl, supabaseKey);

    async function loadHomepage() {
      const { data, error } = await db
        .from("homepage_content")
        .select("*")
        .limit(1)
        .single();

      if (error) {
        console.log("Supabase Error:", error);
        return;
      }

      if (data) {
        document.getElementById("hero-title").innerText = data.title;
        document.getElementById("hero-desc").innerText = data.description;

        if (data.highlight_point) {
          document.getElementById("hero-highlight").innerHTML =
            '<div class="flex items-center gap-2">' +
            '<span class="h-2 w-2 rounded-full bg-emerald-400"></span>' +
            data.highlight_point +
            '</div>';
        }
      }
    }

    loadHomepage();
  </script>

</body>
</html>
